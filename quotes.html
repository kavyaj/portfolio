<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quotes - Kavya Jahagirdar</title>
    <meta name="description" content="A contextual thought stream of quotes that inspire and guide Kavya Jahagirdar">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@400;500;600;700;800;900&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Quotes Page Specific Styles */
        .quotes-page {
            min-height: 100vh;
            background: linear-gradient(135deg, #ffffff 0%, #fafafa 100%);
            padding-top: 120px;
            position: relative;
        }

        .quotes-header {
            text-align: center;
            margin-bottom: 4rem;
            padding: 0 2rem;
        }

        .quotes-title {
            font-family: 'Big Shoulders Display', sans-serif;
            font-size: 4rem;
            font-weight: 800;
            color: #fd5183;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
        }

        .quotes-subtitle {
            font-family: 'DM Sans', sans-serif;
            font-size: 1.2rem;
            color: #666;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .quotes-canvas {
            position: relative;
            min-height: 80vh;
            padding: 2rem;
            padding-bottom: 8rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .quote-item {
            position: absolute;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: center;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(253, 245, 248, 0.95) 100%);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 8px 32px rgba(253, 81, 131, 0.12), 0 2px 8px rgba(0, 0, 0, 0.05);
            border: 2px solid rgba(253, 81, 131, 0.15);
        }

        .quote-item:hover {
            transform: translateY(-12px) scale(1.03);
            box-shadow: 0 20px 60px rgba(253, 81, 131, 0.25), 0 8px 20px rgba(253, 81, 131, 0.1);
            background: linear-gradient(135deg, rgba(255, 255, 255, 1) 0%, rgba(253, 245, 248, 1) 100%);
            border-color: rgba(253, 81, 131, 0.4);
        }

        .quote-text {
            font-family: 'DM Sans', sans-serif;
            font-size: 1.05rem;
            line-height: 1.8;
            color: #2c2c2c;
            margin-bottom: 1.25rem;
            position: relative;
            padding-left: 1.5rem;
        }

        .quote-text::before {
            content: '"';
            font-family: 'Big Shoulders Display', sans-serif;
            font-size: 4rem;
            color: #fd5183;
            position: absolute;
            left: -0.5rem;
            top: -1rem;
            opacity: 0.2;
            font-weight: 800;
        }

        .quote-meta {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            opacity: 0.6;
            transition: opacity 0.3s ease;
        }

        .quote-item:hover .quote-meta {
            opacity: 1;
        }

        .quote-author {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            color: #fd5183;
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        .quote-info-icon {
            width: 18px;
            height: 18px;
            min-width: 18px;
            min-height: 18px;
            border-radius: 50%;
            background: #fd5183;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            font-family: 'DM Sans', sans-serif;
            font-style: italic;
            opacity: 0;
            transition: opacity 0.3s ease;
            flex-shrink: 0;
        }

        .quote-item:hover .quote-info-icon {
            opacity: 1;
        }

        /* Size variations based on importance */
        .quote-large {
            width: 350px;
            font-size: 1.2rem;
        }

        .quote-medium {
            width: 280px;
            font-size: 1rem;
        }

        .quote-small {
            width: 220px;
            font-size: 0.9rem;
        }

        /* Rotation variations for organic feel */
        .quote-item:nth-child(odd) {
            transform: rotate(-1deg);
        }

        .quote-item:nth-child(even) {
            transform: rotate(1deg);
        }

        .quote-item:nth-child(3n) {
            transform: rotate(-2deg);
        }

        .quote-item:hover {
            transform: rotate(0deg) translateY(-8px) scale(1.02);
        }

        /* Modal Styles */
        .quote-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .quote-modal.active {
            opacity: 1;
            visibility: visible;
        }

        .quote-modal-content {
            background: white;
            border-radius: 20px;
            padding: 3rem;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .quote-modal.active .quote-modal-content {
            transform: scale(1);
        }

        .modal-quote-text {
            font-family: 'DM Sans', sans-serif;
            font-size: 1.4rem;
            line-height: 1.8;
            color: #333;
            margin-bottom: 2rem;
            text-align: center;
            position: relative;
        }

        .modal-quote-author {
            font-family: 'Big Shoulders Display', sans-serif;
            font-size: 1.2rem;
            font-weight: 600;
            color: #fd5183;
            text-align: center;
            margin-bottom: 1rem;
        }

        .modal-quote-source {
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            color: #666;
            text-align: center;
            margin-bottom: 2rem;
        }

        .modal-personal-note {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 1.5rem;
            border-left: 4px solid #fd5183;
        }

        .modal-personal-note-title {
            font-family: 'Big Shoulders Display', sans-serif;
            font-size: 1.1rem;
            font-weight: 800;
            color: #333;
            margin-bottom: 0.5rem;
        }

        .modal-personal-note-text {
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            color: #555;
            line-height: 1.6;
        }

        .quote-close {
            position: absolute;
            top: 1rem;
            right: 1.5rem;
            background: none;
            border: none;
            font-size: 2rem;
            color: #666;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .quote-close:hover {
            background: #f0f0f0;
            color: #fd5183;
        }

        /* Responsive Design */
        @media (max-width: 1024px) and (min-width: 769px) {
            /* Tablet view */
            .quotes-canvas {
                padding: 2rem;
                padding-bottom: 10rem;
                min-height: 70vh;
            }
            
            .quotes-title {
                font-size: 3.5rem;
            }
        }
        
        @media (max-width: 768px) {
            .quotes-title {
                font-size: 2.5rem;
            }
            
            .quotes-canvas {
                padding: 1rem;
                padding-bottom: 6rem;
            }
            
            .quote-large,
            .quote-medium,
            .quote-small {
                width: 280px;
                position: relative !important;
                margin-bottom: 2rem;
                transform: none !important;
            }
            
            .quote-modal-content {
                padding: 2rem;
                margin: 1rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <nav class="nav-container">
            <div class="nav-brand">
                <a href="/" class="nav-brand-link">
                    <img src="/images/KJ_logo.svg" alt="Kavya Jahagirdar" class="nav-logo">
                </a>
            </div>
            <div class="nav-menu">
                <a href="/#about" class="nav-link">ABOUT</a>
                <a href="/#projects" class="nav-link">PROJECTS</a>
                <a href="/#experience" class="nav-link">EXPERIENCE</a>
                <a href="/#writing" class="nav-link">WRITING</a>
                <a href="/quotes.html" class="nav-link">QUOTES</a>
            </div>
            <div class="nav-mobile-toggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </nav>
    </header>

    <main class="quotes-page">
        <div class="quotes-header">
            <h1 class="quotes-title">QUOTES</h1>
            <p class="quotes-subtitle">
                A contextual thought stream of wisdom that guides my journey. Each quote represents a moment of clarity, inspiration, or profound understanding that has shaped my perspective.
            </p>
        </div>

        <div class="quotes-canvas" id="quotes-canvas">
            <!-- Quotes will be dynamically inserted here -->
        </div>
    </main>

    <!-- Quote Modal -->
    <div class="quote-modal" id="quote-modal">
        <div class="quote-modal-content">
            <button class="quote-close" onclick="closeQuoteModal()">&times;</button>
            <div class="modal-quote-text" id="modal-quote-text"></div>
            <div class="modal-quote-author" id="modal-quote-author"></div>
            <div class="modal-quote-source" id="modal-quote-source"></div>
            <div class="modal-personal-note" id="modal-personal-note">
                <div class="modal-personal-note-title">Why this resonates with me</div>
                <div class="modal-personal-note-text" id="modal-personal-note-text"></div>
            </div>
        </div>
    </div>

    <script>
        // Sample quotes data with different importance levels
        const quotesData = [
            {
                text: "The best time to plant a tree was 20 years ago. The second best time is now.",
                author: "Chinese Proverb",
                source: "Ancient Wisdom",
                importance: "large",
                personalNote: "This quote reminds me that starting is more important than perfect timing. Every project I've built started with this mindset - it's never too late to begin something meaningful.",
                position: { top: "15%", left: "20%" }
            },
            {
                text: "Simplicity is the ultimate sophistication.",
                author: "Leonardo da Vinci",
                source: "Renaissance Philosophy",
                importance: "large",
                personalNote: "This philosophy drives every design decision I make. Whether it's building Resumey.Pro or designing user experiences, I believe the most elegant solutions are often the simplest ones.",
                position: { top: "40%", left: "60%" }
            },
            {
                text: "Done is better than perfect.",
                author: "Sheryl Sandberg",
                source: "Lean In",
                importance: "medium",
                personalNote: "As a founder, perfectionism can be paralyzing. This quote taught me to embrace iteration and improvement over endless planning.",
                position: { top: "25%", left: "75%" }
            },
            {
                text: "The only way to do great work is to love what you do.",
                author: "Steve Jobs",
                source: "Stanford Commencement Speech",
                importance: "medium",
                personalNote: "This resonates deeply with my journey from engineering to entrepreneurship. Passion has been the fuel for every late night and early morning.",
                position: { top: "65%", left: "25%" }
            },
            {
                text: "Be yourself; everyone else is already taken.",
                author: "Oscar Wilde",
                source: "Literary Wisdom",
                importance: "small",
                personalNote: "In a world of copying and trends, authenticity becomes rare and valuable. This guides how I approach both business and personal relationships.",
                position: { top: "50%", left: "40%" }
            },
            {
                text: "Innovation distinguishes between a leader and a follower.",
                author: "Steve Jobs",
                source: "Apple Philosophy",
                importance: "medium",
                personalNote: "Building products that don't exist yet requires constant innovation. This pushes me to think differently about common problems.",
                position: { top: "80%", left: "65%" }
            },
            {
                text: "The future belongs to those who believe in the beauty of their dreams.",
                author: "Eleanor Roosevelt",
                source: "Presidential Wisdom",
                importance: "small",
                personalNote: "Every startup begins with a dream that seems impossible. This quote reminds me to hold onto that vision even when others can't see it yet.",
                position: { top: "30%", left: "10%" }
            },
            {
                text: "Life is what happens to you while you're busy making other plans.",
                author: "John Lennon",
                source: "Beautiful Boy",
                importance: "small",
                personalNote: "Balancing motherhood and entrepreneurship taught me the truth in this quote. The best moments often happen between the scheduled ones.",
                position: { top: "70%", left: "80%" }
            }
        ];

        function renderQuotes() {
            const canvas = document.getElementById('quotes-canvas');
            const isMobile = window.innerWidth <= 768;
            
            quotesData.forEach((quote, index) => {
                const quoteElement = document.createElement('div');
                quoteElement.className = `quote-item quote-${quote.importance}`;
                
                if (!isMobile) {
                    quoteElement.style.top = quote.position.top;
                    quoteElement.style.left = quote.position.left;
                }
                
                quoteElement.innerHTML = `
                    <div class="quote-text">${quote.text}</div>
                    <div class="quote-meta">
                        <span class="quote-author">— ${quote.author}</span>
                        <div class="quote-info-icon">i</div>
                    </div>
                `;
                
                quoteElement.addEventListener('click', () => openQuoteModal(quote));
                canvas.appendChild(quoteElement);
            });
        }

        function openQuoteModal(quote) {
            const modal = document.getElementById('quote-modal');
            const modalText = document.getElementById('modal-quote-text');
            const modalAuthor = document.getElementById('modal-quote-author');
            const modalSource = document.getElementById('modal-quote-source');
            const modalNote = document.getElementById('modal-personal-note-text');
            
            modalText.textContent = `"${quote.text}"`;
            modalAuthor.textContent = `— ${quote.author}`;
            modalSource.textContent = quote.source;
            modalNote.textContent = quote.personalNote;
            
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeQuoteModal() {
            const modal = document.getElementById('quote-modal');
            modal.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        // Close modal when clicking outside
        document.getElementById('quote-modal').addEventListener('click', (e) => {
            if (e.target.id === 'quote-modal') {
                closeQuoteModal();
            }
        });

        // Close modal with Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeQuoteModal();
            }
        });

        // Initialize page
        document.addEventListener('DOMContentLoaded', () => {
            renderQuotes();
        });

        // Handle window resize
        window.addEventListener('resize', () => {
            const canvas = document.getElementById('quotes-canvas');
            canvas.innerHTML = '';
            renderQuotes();
        });
    </script>
</body>
</html>
